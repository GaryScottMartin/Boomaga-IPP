version: 1
filesystem_policy:
  include_workdir: true
  read_only: [/usr, /lib, /proc, /dev/urandom, /app, /etc, /var/log]
  read_write: [/sandbox, /tmp, /dev/null]
landlock:
  compatibility: best_effort
process:
  run_as_user: sandbox
  run_as_group: sandbox
network_policies:
  codex_cli:
    name: codex-cli
    endpoints:
      # ChatGPT account/device-code authentication and Codex API traffic.
      # These are L4 passthrough entries because the OAuth and streaming
      # traffic is not usefully constrained by simple REST method/path rules.
      - { host: auth.openai.com, port: 443 }
      - { host: chatgpt.com, port: 443 }
      - { host: api.openai.com, port: 443 }
      - { host: chat.openai.com, port: 443 }
    binaries:
      - { path: /usr/local/bin/codex }
      - { path: /usr/bin/codex }
      - { path: /usr/bin/node }

  github_git:
    name: github-git
    endpoints:
      - host: github.com
        port: 443
        protocol: rest
        enforcement: enforce
        rules:
          # Main repo — trailing glob accepts both "Boomaga-IPP" and "Boomaga-IPP.git"
          - allow: { method: GET, path: "/GaryScottMartin/Boomaga-IPP*/info/refs*" }
          - allow: { method: POST, path: "/GaryScottMartin/Boomaga-IPP*/git-upload-pack" }
          - allow: { method: POST, path: "/GaryScottMartin/Boomaga-IPP*/git-receive-pack" }
    binaries:
      - { path: /usr/bin/git }

  github_api:
    name: github-api
    endpoints:
      - host: api.github.com
        port: 443
        path: "/repos/GaryScottMartin/Boomaga-IPP/**"
        protocol: rest
        enforcement: enforce
        rules:
          - allow: { method: "*", path: "/repos/GaryScottMartin/Boomaga-IPP/**" }
    binaries:
      - { path: /usr/bin/git }
      - { path: /usr/bin/gh }
      - { path: /usr/local/bin/codex }
      - { path: /usr/bin/codex }
      - { path: /usr/bin/node }

  npm_registry:
    name: npm-registry
    endpoints:
      - host: registry.npmjs.org
        port: 443
        protocol: rest
        enforcement: enforce
        access: read-only
        allow_encoded_slash: true
    binaries:
      - { path: /usr/bin/npm }
      - { path: /usr/bin/node }

  rust_toolchain:
    name: rust-toolchain
    endpoints:
      # rustup installer and Rust toolchain/component downloads.
      - { host: sh.rustup.rs, port: 443 }
      - { host: static.rust-lang.org, port: 443 }
    binaries:
      # curl downloads rustup-init; rustup then installs/updates the toolchain.
      - { path: /usr/bin/curl }
      - { path: /usr/local/bin/curl }
      - { path: /sandbox/.cargo/bin/rustup }

  cargo_registry:
    name: cargo-registry
    endpoints:
      - { host: crates.io, port: 443 }
      - { host: static.crates.io, port: 443 }
      - { host: index.crates.io, port: 443 }
    binaries:
      # The creation script installs rustup and its Cargo proxy here.
      - { path: /sandbox/.cargo/bin/cargo }
