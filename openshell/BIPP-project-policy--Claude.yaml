version: 1
filesystem_policy:
  include_workdir: true
  read_only: [/usr, /lib, /proc, /dev/urandom, /app, /etc, /var/log]
  read_write: [/sandbox, /tmp, /dev/null]
landlock:
  compatibility: best_effort
process:
  run_as_user: sandbox
  run_as_group: sandbox
network_policies:
  claude_code:
    name: claude-code
    endpoints:
      - { host: api.anthropic.com, port: 443, protocol: rest, enforcement: enforce, access: full }
      - { host: statsig.anthropic.com, port: 443 }
      - { host: sentry.io, port: 443 }
      - { host: raw.githubusercontent.com, port: 443 }
      - { host: platform.claude.com, port: 443 }
    binaries:
      - { path: /usr/local/bin/claude }
      - { path: /usr/bin/node }
  github_git:
    name: github-git
    endpoints:
      - host: github.com
        port: 443
        protocol: rest
        enforcement: enforce
        rules:
          # Main repo — trailing glob accepts both "Boomaga-IPP" and "Boomaga-IPP.git"
          - allow: { method: GET, path: "/GaryScottMartin/Boomaga-IPP*/info/refs*" }
          - allow: { method: POST, path: "/GaryScottMartin/Boomaga-IPP*/git-upload-pack" }
          - allow: { method: POST, path: "/GaryScottMartin/Boomaga-IPP*/git-receive-pack" }
    binaries:
      - { path: /usr/bin/git }
  github_api:
    name: github-api
    endpoints:
      - { host: api.github.com, port: 443, path: "/repos/GaryScottMartin/Boomaga-IPP/**", protocol: rest, enforcement: enforce, rules: [{ allow: { method: "*", path: "/repos/GaryScottMartin/Boomaga-IPP/**" } }] }
    binaries:
      - { path: /usr/bin/git }
      - { path: /usr/bin/gh }
  cargo_registry:
    name: cargo-registry
    endpoints:
      - { host: crates.io, port: 443 }
      - { host: static.crates.io, port: 443 }
      - { host: index.crates.io, port: 443 }
    binaries:
      - { path: /usr/local/bin/cargo }
      - { path: /usr/local/bin/rustc }
