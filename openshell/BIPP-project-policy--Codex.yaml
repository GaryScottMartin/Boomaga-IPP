# codex-policy.yaml
filesystem:
  read:
    - /workspace
    - /tmp
    - /usr/local/bin
  write:
    - /workspace/src
    - /workspace/tests
    - /tmp

network_policies:
  codex:
    name: openai-codex
    endpoints:
      - { host: api.openai.com, port: 443, protocol: rest, enforcement: enforce, access: full }
      - { host: registry.npmjs.org, port: 443, protocol: get }
      - { host: pypi.org, port: 443, protocol: get }
      - { host: api.github.com, port: 443, protocol [GET, POST, PATCH] }
    binaries:
      - { path: /usr/local/bin/claude }
      - { path: /usr/bin/node }
  github_git:
    name: github-git
    endpoints:
      - host: github.com
        port: 443
        protocol: rest
        enforcement: enforce
        rules:
          # Main repo — trailing glob accepts both "Boomaga-IPP" and "Boomaga-IPP.git"
          - allow: { method: GET, path: "/GaryScottMartin/Boomaga-IPP*/info/refs*" }
          - allow: { method: POST, path: "/GaryScottMartin/Boomaga-IPP*/git-upload-pack" }
          - allow: { method: POST, path: "/GaryScottMartin/Boomaga-IPP*/git-receive-pack" }
    binaries:
      - { path: /usr/bin/git }
  github_api:
    name: github-api
    endpoints:
      - { host: api.github.com, port: 443, path: "/repos/GaryScottMartin/Boomaga-IPP/**", protocol: rest, enforcement: enforce, rules: [{ allow: { method: "*", path: "/repos/GaryScottMartin/Boomaga-IPP/**" } }] }
    binaries:
      - { path: /usr/bin/git }
      - { path: /usr/bin/gh }
  cargo_registry:
    name: cargo-registry
    endpoints:
      - { host: crates.io, port: 443 }
      - { host: static.crates.io, port: 443 }
      - { host: index.crates.io, port: 443 }
    binaries:
      - { path: /usr/local/bin/cargo }
      - { path: /usr/local/bin/rustc }

process:
  allowed_binaries:
    - node
    - npm
    - npx
    - python3
    - pip
    - git
    - codex
